version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestionchasis-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_NAME: GestionChasis
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: proyecto-GestionChacis
      DB_USERNAME: root
      DB_PASSWORD: root

      RUN_MIGRATIONS: "true"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: gestionchasis-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: proyecto-GestionChacis
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
